<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>FLOW — Calisthenics</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Bodoni+Moda:ital,wght@1,700;1,900&display=swap');

:root{
  --black:#000000;
  --ink:#070708;
  --panel:#0c0c0e;
  --panel-2:#131316;
  --panel-3:#1a1a1e;
  /* === Helles Pink ist jetzt DIE Akzentfarbe der ganzen App === */
  --pink:#ff4d9e;
  --pink-bright:#ff7ab8;
  --pink-pale:#ffb3d6;
  --pink-glow:rgba(255,77,158,0.55);
  --pink-glow-soft:rgba(255,77,158,0.28);
  --pink-dim:rgba(255,122,184,0.16);
  --white:#ffffff;
  --line:rgba(255,77,158,0.22);
  --line-soft:rgba(255,255,255,0.08);
  /* === Akzentpalette für Titel & Trainingstexte === */
  --c-banana:#ffe066;
  --c-grey:#b7b7c2;
  --c-snow:#fbfcff;
  --c-royal:#5d7cf0;
  --c-pink:var(--pink-bright);
  --c-maroon:#d9788f;
  --c-tan:#dab68c;
  --maroon-deep:#3a0b14;
  --maroon-mid:#6e1626;
  --maroon-card:#5a1320;
  --purple-deep:#3c1a66;
  --font-display:'Poppins',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --font-elegant:'Bodoni Moda',serif;
  --ease-flow:cubic-bezier(.22,1,.36,1);
  --ease-curtain:cubic-bezier(.16,1,.3,1);
  --ease-slide:cubic-bezier(.65,0,.35,1);
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--black);overscroll-behavior:none;}
body{
  font-family:var(--font-display);
  color:var(--white);
  width:100%;
  height:100vh;
  overflow:hidden;
  -webkit-user-select:none;
  user-select:none;
  position:fixed;
  inset:0;
}
button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;}
input{font-family:inherit;color:inherit;}
::-webkit-scrollbar{width:0;height:0;}

#app{position:fixed;inset:0;width:100%;height:100%;overflow:hidden;background:var(--black);}

.screen{
  position:absolute;inset:0;
  width:100%;height:100%;
  overflow:hidden;
  background:var(--black);
}
.hidden{display:none !important;}

.screen-exit-left{
  animation:slideOutLeft .75s var(--ease-slide) forwards;
}
@keyframes slideOutLeft{
  to{ transform:translateX(-100%); }
}
.screen-enter{
  animation:flowFadeIn .9s var(--ease-flow) both;
}
@keyframes flowFadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

/* ============ HOME SCREEN ============ */
#screen-home{z-index:100; background:radial-gradient(ellipse 140% 100% at 50% 30%, #150811 0%, #000000 62%);}
#canvas-shader-home{position:absolute;inset:0;width:100%;height:100%;}
#canvas-home{position:absolute;inset:0;width:100%;height:100%;}
#canvas-trail-home{position:absolute;inset:0;width:100%;height:100%; mix-blend-mode:screen; opacity:.85; pointer-events:none;}
.home-bg-pattern{
  position:absolute; inset:0; pointer-events:none; opacity:.28; mix-blend-mode:overlay;
  background-image:
    repeating-linear-gradient(135deg, rgba(255,255,255,.018) 0 2px, transparent 2px 26px);
}
.home-header{
  position:absolute; top:9%; left:0; right:0;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  z-index:10; pointer-events:none;
}
.home-eyebrow{
  font-family:var(--font-mono); font-size:11px; letter-spacing:.4em; font-weight:600;
  color:var(--pink-bright); opacity:.9;
}
.home-title{
  font-family:var(--font-display); font-weight:900; font-size:8.8vw; margin:0;
  letter-spacing:.015em; color:var(--white); white-space:nowrap;
  text-shadow:0 0 26px var(--pink-glow), 0 0 70px var(--pink-glow-soft);
}
.home-hint{
  position:absolute; bottom:11%; z-index:10;
  font-family:var(--font-mono); font-size:11.5px; letter-spacing:.08em;
  color:var(--pink-pale); text-transform:uppercase;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  opacity:.9; pointer-events:none;
}
.home-hint.left{left:8%;}
.home-hint.right{right:8%; text-align:right;}
.home-tap-zone{position:absolute; top:0; bottom:0; width:50%; z-index:4; background:transparent;}
.home-tap-zone.left{left:0;}
.home-tap-zone.right{right:0;}
.home-hint .dot{width:5px;height:5px;border-radius:50%;background:var(--pink);box-shadow:0 0 8px var(--pink);}

/* ============ BACK ARROW (shared) ============ */
.back-arrow{
  position:absolute; top:max(20px,env(safe-area-inset-top)); left:18px; z-index:200;
  width:42px;height:42px; display:flex; align-items:center; justify-content:center;
  border-radius:50%; background:rgba(255,255,255,.04); border:1px solid var(--line-soft);
  backdrop-filter:blur(6px);
}
.back-arrow svg{width:18px;height:18px;}
.back-arrow:active{background:rgba(255,31,122,.14);}

/* ============ CAROUSEL SCREEN ============ */
#screen-carousel{z-index:110; background:radial-gradient(ellipse 140% 90% at 50% 18%, #0d0509 0%, #000000 55%);}
.carousel-heading{
  position:absolute; top:max(26px,env(safe-area-inset-top)); left:0; right:0;
  text-align:center; z-index:20; pointer-events:none;
}
.carousel-eyebrow{
  font-family:var(--font-mono); font-size:11px; letter-spacing:.4em; color:var(--pink-pale); opacity:.8;
}
.carousel-stage{
  position:absolute; inset:0; top:90px; bottom:130px;
  perspective:1300px; perspective-origin:50% 50%;
  display:flex; align-items:center; justify-content:center;
  touch-action:none;
}
.carousel-rotor{
  position:relative; width:180px; height:264px;
  transform-style:preserve-3d;
  will-change:transform;
}
.card{
  position:absolute; inset:0; width:180px; height:264px;
  transform-style:preserve-3d;
  will-change:transform;
}
.card-flipper{
  position:absolute; inset:0; transform-style:preserve-3d;
  transition:transform .6s var(--ease-flow);
}
.card.flipped .card-flipper{ transform:rotateY(180deg); }
.card-face{
  position:absolute; inset:0; width:100%; height:100%;
  border-radius:18px; backface-visibility:hidden;
  overflow:hidden;
  border:1px solid var(--line);
  box-shadow:0 14px 40px rgba(0,0,0,.6);
}
.card-front{
  background:linear-gradient(160deg, var(--maroon-mid) 0%, var(--maroon-deep) 75%);
  display:flex; flex-direction:column; padding:14px;
  transition:box-shadow .4s var(--ease-flow);
}
.card.active .card-front{
  box-shadow:0 0 0 1.5px var(--pink-bright), 0 0 30px var(--pink-glow), 0 0 70px var(--pink-glow-soft), 0 14px 40px rgba(0,0,0,.6);
}
.card-corner{
  position:absolute; font-family:var(--font-mono); font-weight:700; font-size:12px;
  color:var(--pink-pale); line-height:1; display:flex; flex-direction:column; align-items:center; gap:1px;
}
.card-corner.tl{top:10px; left:10px;}
.card-corner.br{bottom:10px; right:10px; transform:rotate(180deg);}
.card-rank{font-size:13px;}
.card-suit{font-size:13px;}
.card-mid{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  text-align:center; padding:0 6px;
}
.card-day-name{font-family:var(--font-display); font-weight:900; font-size:18px; letter-spacing:.01em; color:var(--pink-bright); text-shadow:0 0 14px var(--pink-glow-soft);}
.card-day-focus{font-family:var(--font-mono); font-size:9.5px; letter-spacing:.06em; color:var(--pink-pale); opacity:.85; text-transform:uppercase;}
.card-level{
  font-family:var(--font-mono); font-size:8.5px; letter-spacing:.1em; color:rgba(255,255,255,.55);
  padding:3px 8px; border:1px solid var(--line-soft); border-radius:20px; text-transform:uppercase;
}
.card-wave{position:absolute; left:0; right:0; bottom:0; height:54px; overflow:hidden;}
.card-wave-layer{position:absolute; bottom:-2px; left:0; width:200%; height:100%;}
.card-wave-layer.l1{animation:waveScroll 7.4s linear infinite; opacity:.9;}
.card-wave-layer.l2{animation:waveScrollRev 10.2s linear infinite; opacity:.75;}
.card-wave-layer.l3{animation:waveScroll 13.6s linear infinite; opacity:.95;}
@keyframes waveScroll{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
@keyframes waveScrollRev{ from{transform:translateX(-50%);} to{transform:translateX(0);} }
.card-back{
  background:#3a0f17;
  background-image:
    repeating-linear-gradient(45deg, transparent 0 9px, var(--pink-dim) 9px 10px),
    repeating-linear-gradient(-45deg, transparent 0 9px, rgba(255,255,255,.025) 9px 10px);
  transform:rotateY(180deg);
}
.card-back-symbol{
  position:absolute; font-size:15px; color:var(--pink-pale); opacity:.7; font-family:var(--font-mono);
}
.card-back-symbol.tl{top:12px;left:12px;}
.card-back-symbol.tr{top:12px;right:12px;}
.card-back-symbol.bl{bottom:12px;left:12px;}
.card-back-symbol.br{bottom:12px;right:12px;}
.card-back-center{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:900; font-size:26px; color:var(--pink-bright); opacity:.24;
  letter-spacing:.05em;
}
/* ============ KARTEN-STAPEL INTRO (Deck auf dem Tisch) ============ */
.deck-table{
  position:absolute; left:50%; bottom:8%; transform:translateX(-50%);
  width:220px; height:120px; z-index:1; pointer-events:none;
  transition:opacity .55s ease, transform .7s var(--ease-flow);
}
.deck-table.exit{ opacity:0; transform:translateX(-50%) translateY(40px) scale(.85); }
.deck-table-surface{
  position:absolute; left:0; right:0; bottom:0; height:34px; border-radius:50%;
  background:radial-gradient(ellipse 70% 100% at 50% 50%, rgba(255,77,158,.16), transparent 75%);
  filter:blur(2px);
}
.deck-stack{position:absolute; left:50%; bottom:18px; width:108px; height:158px; transform:translateX(-50%);}
.deck-card{
  position:absolute; inset:0; border-radius:11px;
  background:#3a0f17;
  background-image:
    repeating-linear-gradient(45deg, transparent 0 6px, var(--pink-dim) 6px 7px);
  border:1px solid var(--line);
  box-shadow:0 6px 16px rgba(0,0,0,.55);
}
.carousel-footer{
  position:absolute; left:0; right:0; bottom:max(28px,env(safe-area-inset-bottom));
  display:flex; flex-direction:column; align-items:center; gap:4px; z-index:15; pointer-events:none;
}
.carousel-day-name{font-family:var(--font-display); font-weight:900; font-size:22px; color:var(--pink-bright); text-shadow:0 0 16px var(--pink-glow-soft); transition:opacity .25s;}
/* ============ KARTEN-ÖFFNEN-ANIMATION (Klon-Overlay) ============ */
.card-open-clone{
  position:fixed; z-index:560; perspective:1300px; pointer-events:none;
  transition:transform .85s var(--ease-flow);
}
.card-open-clone .card-flipper{ transition:transform .62s var(--ease-flow); }
.carousel-day-sub{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.12em; color:var(--pink-pale); text-transform:uppercase; transition:opacity .25s;}
.carousel-tapme{
  position:absolute; left:0; right:0; bottom:max(8px,env(safe-area-inset-bottom)); text-align:center;
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:.18em; color:rgba(255,255,255,.3);
  text-transform:uppercase; z-index:14; pointer-events:none;
}

/* ============ CURTAIN SCREENS (day detail / exercise detail) ============ */
.curtain{
  position:absolute; inset:0; z-index:300; background:var(--black);
  transform:translateY(100%); transition:transform .68s var(--ease-curtain);
  overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.curtain.curtain-2{z-index:350;}
.curtain.open{transform:translateY(0);}
.curtain-inner{min-height:100%; padding-bottom:60px;}

.day-hero{
  position:relative; padding:70px 22px 26px; overflow:hidden;
  background:radial-gradient(ellipse 140% 70% at 50% -10%, var(--pink-dim), transparent 60%);
  border-bottom:1px solid var(--line-soft);
}
.day-hero-suit{font-family:var(--font-mono); font-size:11px; letter-spacing:.3em; color:var(--pink-bright); font-weight:600; opacity:.9;}
.day-hero-title{font-family:var(--font-display); font-weight:900; font-size:34px; margin:8px 0 10px; color:var(--white);}
.day-hero-meta{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
.meta-chip{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:.06em; color:rgba(255,255,255,.7);
  border:1px solid var(--line-soft); padding:5px 10px; border-radius:20px; text-transform:uppercase;
}
.meta-chip.lvl{color:var(--c-banana); border-color:rgba(255,224,102,.3);}
.meta-chip.dur{color:var(--c-tan); border-color:rgba(218,182,140,.3);}
.day-hero-quote{font-size:14.5px; line-height:1.55; color:rgba(255,255,255,.78); font-style:italic; max-width:560px;}

.section-block{padding:24px 22px;}
.section-title{
  font-family:var(--font-mono); font-size:11px; letter-spacing:.28em; color:var(--pink-bright);
  text-transform:uppercase; margin:0 0 14px; display:flex; align-items:center; gap:8px; font-weight:700;
}
.section-title::before{content:''; width:14px; height:1px; background:var(--pink-bright); display:inline-block;}

/* ============ FLOW-SEQUENZ: Block-zu-Block Ablauf statt Stichpunkte ============ */
.flow-sequence{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; position:relative; margin-left:2px;}
.flow-step{position:relative; padding:11px 0 11px 32px;}
.flow-step::before{
  content:''; position:absolute; left:6px; top:26px; bottom:-4px; width:2px;
  background:linear-gradient(180deg, var(--pink-glow-soft), rgba(255,255,255,.05));
}
.flow-step:last-child::before{display:none;}
.flow-step-dot{
  position:absolute; left:0; top:13px; width:14px; height:14px; border-radius:50%;
  background:var(--pink-bright); box-shadow:0 0 10px var(--pink-glow);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:7px; font-weight:800; color:#2a0414;
}
.flow-step-text{font-size:14px; line-height:1.45; font-weight:500;}

.exercise-box{margin-bottom:24px; position:relative;}
.exercise-box-label{
  display:flex; align-items:center; gap:8px; margin:0 0 10px; padding-left:2px;
  font-family:var(--font-mono); font-weight:700; font-size:10.5px; letter-spacing:.18em;
  color:var(--pink-bright); text-transform:uppercase;
}
.exercise-box-label::before{content:'――'; opacity:.55; font-weight:400; letter-spacing:0;}
.exercise-box-label b{font-family:var(--font-display); font-weight:900; font-size:15px; letter-spacing:0; color:var(--white); margin-right:2px;}
.exercise-box-items{
  display:flex; flex-direction:column; gap:9px;
  border:1.5px dashed var(--line); border-radius:18px; padding:12px;
  background:linear-gradient(135deg, var(--pink-dim), transparent 65%);
}
.exercise-row{
  display:flex; align-items:center; gap:14px; padding:14px 14px;
  background:var(--panel); border:1px solid var(--line-soft); border-radius:14px;
  transition:background .25s, border-color .25s;
}
.exercise-row.done{border-color:var(--pink-glow-soft); background:linear-gradient(120deg, var(--pink-dim), var(--panel));}
.exercise-row-index{
  font-family:var(--font-mono); font-size:11px; color:rgba(255,255,255,.35); width:18px; flex-shrink:0;
}
.exercise-row-main{flex:1; min-width:0;}
.exercise-row-name{font-family:var(--font-display); font-weight:700; font-size:15px;}
.exercise-row-sub{font-family:var(--font-mono); font-size:10.5px; color:rgba(255,255,255,.5); margin-top:3px; letter-spacing:.04em;}
.exercise-row-check{
  width:26px;height:26px; border-radius:50%; border:1.5px solid rgba(255,255,255,.22); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; transition:all .25s;
}
.exercise-row.done .exercise-row-check{background:var(--pink-bright); border-color:var(--pink-bright); box-shadow:0 0 12px var(--pink-glow);}
.exercise-row-check svg{width:13px;height:13px; opacity:0; transition:opacity .2s;}
.exercise-row.done .exercise-row-check svg{opacity:1;}
.exercise-row-arrow{color:rgba(255,255,255,.25); flex-shrink:0;}

.day-closing{
  padding:30px 22px 50px; text-align:center;
}
.day-closing-text{font-family:var(--font-display); font-style:italic; font-weight:600; font-size:16px; color:var(--pink-bright); line-height:1.6;}

/* ============ EXERCISE DETAIL ============ */
.ex-hero{padding:70px 22px 18px; position:relative;}
.ex-hero-name{font-family:var(--font-display); font-weight:900; font-size:28px; margin:4px 0 12px;}
.muscle-tag{
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:.06em; padding:4px 9px; border-radius:20px;
  text-transform:uppercase; margin-right:6px; display:inline-block; margin-bottom:6px;
}
.muscle-tag.primary{background:rgba(255,31,122,.22); color:var(--pink-pale); border:1px solid var(--pink-glow-soft);}
.muscle-tag.secondary{background:rgba(255,255,255,.06); color:rgba(255,255,255,.5); border:1px solid var(--line-soft);}

.stat-row{display:flex; gap:10px; padding:0 22px 6px;}
.stat-box{
  flex:1; background:var(--panel); border:1px solid var(--line-soft); border-radius:14px; padding:14px 10px; text-align:center;
}
.stat-box-value{font-family:var(--font-mono); font-weight:700; font-size:19px; color:var(--white);}
.stat-box-label{font-family:var(--font-mono); font-size:9px; letter-spacing:.1em; color:rgba(255,255,255,.4); text-transform:uppercase; margin-top:4px;}

.ex-desc{padding:22px 22px 6px; font-size:14.5px; line-height:1.6; color:rgba(255,255,255,.78);}
.tip-list{list-style:none; margin:0; padding:0 22px 6px; display:flex; flex-direction:column; gap:12px;}
.tip-item{display:flex; gap:11px; align-items:flex-start; font-size:13.5px; color:rgba(255,255,255,.72); line-height:1.5;}
.tip-icon{width:26px;height:26px; flex-shrink:0; border-radius:50%; background:rgba(255,31,122,.12); display:flex; align-items:center; justify-content:center;}
.tip-icon svg{width:13px;height:13px; color:var(--pink-pale);}

.silhouette-wrap{padding:22px; display:flex; flex-direction:column; align-items:center; gap:10px;}
.silhouette-wrap svg{width:140px;}
.sil-primary{animation:silPulse 2.4s ease-in-out infinite;}
@keyframes silPulse{0%,100%{opacity:.95;} 50%{opacity:.55;}}
.sil-secondary{opacity:.35;}

.variant-row{display:flex; gap:12px; padding:0 22px 6px;}
.variant-box{flex:1; background:var(--panel); border:1px solid var(--line-soft); border-radius:14px; padding:14px;}
.variant-tag{font-family:var(--font-mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--pink-pale); margin-bottom:6px; display:block;}
.variant-name{font-family:var(--font-display); font-weight:600; font-size:14px; margin-bottom:5px;}
.variant-desc{font-size:11.5px; color:rgba(255,255,255,.55); line-height:1.4;}

.cue-box{
  margin:18px 22px; padding:16px 18px; border-left:2px solid var(--pink); border-radius:0 12px 12px 0;
  background:linear-gradient(90deg, var(--pink-dim), transparent);
}
.cue-label{font-family:var(--font-mono); font-size:9.5px; letter-spacing:.16em; color:var(--pink-pale); text-transform:uppercase; margin-bottom:6px;}
.cue-text{font-family:var(--font-display); font-style:italic; font-size:14.5px; line-height:1.5; color:rgba(255,255,255,.88);}

.rm-calc{margin:6px 22px 22px; background:var(--panel); border:1px solid var(--line-soft); border-radius:16px; padding:18px;}
.rm-calc-title{font-family:var(--font-mono); font-size:10px; letter-spacing:.16em; color:var(--pink-pale); text-transform:uppercase; margin-bottom:14px;}
.rm-inputs{display:flex; gap:10px; margin-bottom:14px;}
.rm-field{flex:1;}
.rm-field label{font-family:var(--font-mono); font-size:9px; letter-spacing:.08em; color:rgba(255,255,255,.4); text-transform:uppercase; display:block; margin-bottom:6px;}
.rm-field input{
  width:100%; background:var(--panel-2); border:1px solid var(--line-soft); border-radius:10px; padding:10px 12px;
  font-family:var(--font-mono); font-size:15px; color:var(--white);
}
.rm-field input:focus{outline:none; border-color:var(--pink-glow-soft);}
.rm-result{display:flex; align-items:center; justify-content:space-between; padding-top:6px; border-top:1px solid var(--line-soft); margin-bottom:10px;}
.rm-result-label{font-family:var(--font-mono); font-size:10px; color:rgba(255,255,255,.45); letter-spacing:.08em; text-transform:uppercase;}
.rm-result-value{font-family:var(--font-mono); font-weight:700; font-size:22px; color:var(--pink-bright);}
.rm-table{display:grid; grid-template-columns:repeat(5,1fr); gap:6px;}
.rm-table-cell{text-align:center; background:var(--panel-2); border-radius:8px; padding:8px 2px;}
.rm-table-pct{font-family:var(--font-mono); font-size:9px; color:rgba(255,255,255,.4);}
.rm-table-val{font-family:var(--font-mono); font-size:12px; font-weight:600; margin-top:3px;}

.complete-btn{
  display:flex; align-items:center; justify-content:center; gap:10px;
  margin:8px 22px 40px; padding:18px; border-radius:16px;
  background:linear-gradient(135deg, var(--pink), #c8125f);
  font-family:var(--font-display); font-weight:700; font-size:15px; letter-spacing:.04em;
  text-transform:uppercase; color:var(--white); box-shadow:0 8px 30px var(--pink-glow-soft);
  transition:all .3s var(--ease-flow);
}
.complete-btn.is-done{
  background:var(--panel-2); color:rgba(255,255,255,.5); box-shadow:none; border:1px solid var(--line-soft);
}
.complete-btn svg{width:17px;height:17px;}

/* ============ MUSCLE WORLD ============ */
#screen-muscle-world{z-index:120; background:var(--black); overflow-y:auto; -webkit-overflow-scrolling:touch;}
.mw-header{
  position:sticky; top:0; z-index:10; padding:70px 20px 0;
  background:linear-gradient(180deg, var(--black) 70%, transparent);
}
.mw-title{font-family:var(--font-display); font-weight:900; font-size:11vw; line-height:1.02; text-align:center; margin-bottom:22px; color:var(--white);}
@media(min-width:680px){ .mw-title{font-size:56px;} }
.mw-tabs{display:flex; gap:6px; background:var(--panel); border-radius:14px; padding:5px; margin-bottom:6px;}
.mw-tab{flex:1; text-align:center; padding:11px 0; border-radius:11px; font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,.5); transition:all .25s;}
.mw-tab.active{background:var(--pink-bright); color:#1a0410; font-weight:700; box-shadow:0 4px 18px var(--pink-glow-soft);}

.day-banner{margin:22px 20px; padding:18px 20px; border-radius:16px; background:linear-gradient(135deg, var(--panel), var(--panel-2)); border:1px solid var(--line-soft); display:flex; justify-content:space-between; align-items:center;}
.day-banner-name{font-family:var(--font-display); font-weight:900; font-size:18px; color:var(--pink-bright);}
.day-banner-status{font-family:var(--font-mono); font-size:10.5px; color:var(--pink-pale); letter-spacing:.04em; text-align:right;}

.mw-section-label{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.22em; color:rgba(255,255,255,.4); text-transform:uppercase; margin:0 20px 12px;}
.muscle-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 20px; margin-bottom:26px;}
.muscle-grid.majors{grid-template-columns:1fr;}
.muscle-card{
  border-radius:20px; padding:18px; position:relative; overflow:hidden;
  border:1.5px solid var(--ringColor);
  background:linear-gradient(155deg, rgba(255,255,255,.05), transparent 55%), var(--panel);
  transition:transform .22s var(--ease-flow), box-shadow .22s;
  animation:muscleCardPulse 3.4s ease-in-out infinite;
}
.muscle-grid.majors .muscle-card{ padding:22px; }
.muscle-card:active{ transform:scale(.96); }
@keyframes muscleCardPulse{
  0%,100%{ box-shadow:0 0 0px var(--ringColor), 0 10px 24px rgba(0,0,0,.5); }
  50%{ box-shadow:0 0 26px var(--ringColor), 0 10px 24px rgba(0,0,0,.5); }
}
.muscle-card::after{
  content:''; position:absolute; top:0; bottom:0; left:-45%; width:32%; pointer-events:none; z-index:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.09), transparent);
  animation:muscleSheen 6s ease-in-out infinite;
}
@keyframes muscleSheen{ 0%{left:-45%;} 45%{left:120%;} 100%{left:120%;} }
.muscle-card-top{display:flex; align-items:center; justify-content:space-between; gap:12px; position:relative; z-index:1;}
.muscle-card-name{font-family:var(--font-display); font-weight:800; font-size:14.5px; margin-bottom:3px;}
.muscle-grid.majors .muscle-card-name{font-size:19px;}
.muscle-card-role{font-family:var(--font-mono); font-size:8.5px; letter-spacing:.1em; opacity:.6; text-transform:uppercase;}
.muscle-card-pctbig{
  font-family:var(--font-display); font-weight:900; line-height:1; color:var(--ringColor);
  font-size:30px; text-shadow:0 0 22px var(--ringColor); flex-shrink:0;
}
.muscle-grid.majors .muscle-card-pctbig{ font-size:46px; }
.muscle-card-status{
  position:relative; z-index:1; font-family:var(--font-mono); font-size:8px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ringColor); padding:4px 10px; border-radius:20px; display:inline-block; margin-top:13px; border:1px solid var(--ringColor);
  background:rgba(255,255,255,.08);
  background:color-mix(in srgb, var(--ringColor) 14%, transparent);
}
.muscle-card-hint{position:relative; z-index:1; font-family:var(--font-mono); font-size:9px; opacity:.55; margin-top:9px; margin-bottom:14px; line-height:1.4;}
.muscle-ecg{position:absolute; left:0; right:0; bottom:0; height:30px; opacity:.5; pointer-events:none;}
.muscle-ecg svg{position:absolute; bottom:0; left:0; width:200%; height:100%; animation:ecgScroll 2.6s linear infinite;}
@keyframes ecgScroll{ from{transform:translateX(0);} to{transform:translateX(-50%);} }

.streak-block{margin:22px 20px; padding:22px; border-radius:18px; background:var(--panel); border:1px solid var(--line-soft); text-align:center;}
.streak-number{font-family:var(--font-display); font-weight:900; font-size:46px; color:var(--pink-bright); text-shadow:0 0 24px var(--pink-glow-soft);}
.streak-label{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.2em; color:rgba(255,255,255,.45); text-transform:uppercase; margin-top:2px;}
.heatmap{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-top:20px;}
.heatmap-cell{aspect-ratio:1; border-radius:5px; background:rgba(255,255,255,.05);}
.heatmap-cell.trained{background:var(--pink); box-shadow:0 0 6px var(--pink-glow-soft);}
.heatmap-cell.today{box-shadow:0 0 0 1.5px var(--white) inset;}
.heatmap-dow{font-family:var(--font-mono); font-size:8px; color:rgba(255,255,255,.3); text-align:center; margin-bottom:4px;}

.pr-block{margin:22px 20px;}
.pr-list{display:flex; flex-direction:column; gap:1px; border-radius:14px; overflow:hidden; border:1px solid var(--line-soft);}
.pr-row{display:flex; justify-content:space-between; align-items:center; padding:13px 16px; background:var(--panel);}
.pr-row-name{font-family:var(--font-display); font-size:13.5px; font-weight:500;}
.pr-row-value{font-family:var(--font-mono); font-size:13.5px; color:var(--pink-bright); font-weight:600;}
.empty-hint{font-family:var(--font-mono); font-size:11.5px; color:rgba(255,255,255,.32); text-align:center; padding:26px 20px; line-height:1.6;}

.history-list{display:flex; flex-direction:column; gap:8px; padding:0 20px 50px;}
.history-row{display:flex; align-items:center; gap:12px; padding:13px 14px; background:var(--panel); border:1px solid var(--line-soft); border-radius:13px;}
.history-dot{width:8px;height:8px;border-radius:50%; background:var(--pink); box-shadow:0 0 8px var(--pink-glow-soft); flex-shrink:0;}
.history-main{flex:1;}
.history-day{font-family:var(--font-display); font-weight:600; font-size:13.5px;}
.history-meta{font-family:var(--font-mono); font-size:9.5px; color:rgba(255,255,255,.42); margin-top:2px;}
.history-count{font-family:var(--font-mono); font-size:11px; color:rgba(255,255,255,.5);}

/* ============ PR CELEBRATION ============ */
.pr-celebration{
  position:fixed; inset:0; z-index:900; display:flex; align-items:center; justify-content:center;
  pointer-events:none; opacity:0;
}
.pr-celebration.show{ animation:prFlash 2.6s var(--ease-flow) forwards; }
@keyframes prFlash{
  0%{opacity:0;} 12%{opacity:1;} 78%{opacity:1;} 100%{opacity:0;}
}
.pr-glow{position:absolute; inset:0; background:radial-gradient(ellipse 80% 60% at 50% 50%, rgba(255,40,40,.55), rgba(120,0,10,.7) 45%, rgba(0,0,0,.94) 78%);}
.pr-text{position:relative; text-align:center; transform:scale(.85); animation:prPop 2.6s var(--ease-flow) forwards;}
@keyframes prPop{
  0%{transform:scale(.8);} 14%{transform:scale(1.04);} 22%{transform:scale(1);} 78%{transform:scale(1);} 100%{transform:scale(1.05);}
}
.pr-title{font-family:var(--font-display); font-weight:900; font-size:13vw; letter-spacing:.04em; color:#fff; text-shadow:0 0 30px rgba(255,60,60,.9), 0 0 70px rgba(255,30,30,.6);}
.pr-exercise{font-family:var(--font-mono); font-size:13px; letter-spacing:.1em; color:rgba(255,255,255,.85); margin-top:14px; text-transform:uppercase;}
.pr-value{font-family:var(--font-mono); font-size:15px; color:#ff8a8a; margin-top:6px; font-weight:600;}

/* ============ REST TIMER CAPSULE ============ */
.rest-timer{
  position:fixed; left:50%; bottom:max(26px,env(safe-area-inset-bottom)); transform:translate(-50%,140%);
  z-index:800; display:flex; align-items:center; gap:14px; padding:10px 14px 10px 20px;
  background:rgba(14,14,16,.92); border:1px solid var(--pink-glow-soft); border-radius:40px;
  backdrop-filter:blur(14px); box-shadow:0 10px 40px rgba(0,0,0,.6);
  transition:transform .55s var(--ease-curtain), box-shadow .4s;
}
.rest-timer.show{transform:translate(-50%,0);}
.rest-timer.urgent{box-shadow:0 0 0 1px var(--pink), 0 10px 40px var(--pink-glow-soft); animation:restPulse 1s ease-in-out infinite;}
@keyframes restPulse{0%,100%{transform:translate(-50%,0) scale(1);} 50%{transform:translate(-50%,0) scale(1.035);}}
.rest-timer-number{font-family:var(--font-mono); font-weight:700; font-size:21px; color:var(--pink-bright); min-width:38px; text-align:center;}
.rest-timer-label{font-family:var(--font-mono); font-size:9.5px; letter-spacing:.18em; color:rgba(255,255,255,.5); text-transform:uppercase;}
.rest-timer-close{width:26px;height:26px; border-radius:50%; background:rgba(255,255,255,.07); display:flex; align-items:center; justify-content:center; font-size:14px; color:rgba(255,255,255,.6);}

/* ============ ONBOARDING / LANDING PAGE ============ */
.onboarding{
  position:fixed; inset:0; z-index:950;
  background:radial-gradient(ellipse 120% 80% at 50% 28%, #1c0613 0%, #000 65%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px 26px; text-align:center;
  overflow:hidden;
}
.onboarding-pattern{
  position:absolute; inset:0; pointer-events:none; opacity:.55;
  background-image:
    repeating-linear-gradient(0deg, transparent 0 38px, rgba(255,122,184,.06) 38px 39px),
    repeating-linear-gradient(90deg, transparent 0 38px, rgba(255,122,184,.06) 38px 39px),
    radial-gradient(circle at 50% 100%, rgba(255,77,158,.18), transparent 55%);
  animation:patternDrift 26s linear infinite;
}
@keyframes patternDrift{ from{background-position:0 0,0 0,0 0;} to{background-position:38px 38px,-38px 38px,0 0;} }
.onboarding-content{position:relative; z-index:2; display:flex; flex-direction:column; align-items:center;}
.onboarding-title{font-family:var(--font-display); font-weight:900; font-size:27px; margin-bottom:14px;}
.onboarding-particle-canvas{width:100%; max-width:380px; height:auto; aspect-ratio:640/190; display:block; margin-bottom:8px;}
.onboarding-text{font-size:14.5px; line-height:1.65; color:rgba(255,255,255,.7); margin-bottom:38px; max-width:380px;}
.onboarding-cta{position:relative; width:236px; height:236px; display:flex; align-items:center; justify-content:center;}
.ob-crystal{
  position:absolute; left:50%; top:50%; width:20px; height:20px;
  margin:-10px 0 0 -10px; transform-origin:118px 10px;
  animation:obOrbit 7.5s linear infinite;
}
.ob-crystal.c2{ animation-duration:10s; animation-direction:reverse; }
.ob-crystal svg{ width:100%; height:100%; display:block; animation:obSpin 3.2s linear infinite;
  filter:drop-shadow(0 0 8px var(--pink-glow)) drop-shadow(0 0 18px var(--pink-glow-soft)); }
@keyframes obOrbit{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
@keyframes obSpin{ from{transform:rotate(0deg);} to{transform:rotate(-360deg);} }
.onboarding-btn{
  position:relative; z-index:3; padding:18px 40px; border-radius:50px; overflow:hidden;
  background:linear-gradient(135deg, var(--pink), #b3215f);
  font-family:var(--font-display); font-weight:800; font-size:14.5px; letter-spacing:.05em; text-transform:uppercase;
  box-shadow:0 10px 40px var(--pink-glow-soft), 0 0 0 1px var(--pink-glow-soft);
  color:var(--white);
}
.onboarding-btn span{position:relative; z-index:2;}
.onboarding-btn::before{
  content:''; position:absolute; inset:-50%;
  background:radial-gradient(circle, rgba(255,255,255,.6), transparent 60%);
  filter:blur(11px); opacity:.55; mix-blend-mode:screen;
  animation:fogDrift 4.6s ease-in-out infinite;
}
@keyframes fogDrift{
  0%{ transform:translate(-32%,12%) scale(1); }
  50%{ transform:translate(32%,-12%) scale(1.3); }
  100%{ transform:translate(-32%,12%) scale(1); }
}
.onboarding-scroll-hint{
  position:relative; z-index:2; margin-top:32px; display:flex; flex-direction:column; align-items:center; gap:6px;
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:.24em; text-transform:uppercase; color:rgba(255,255,255,.4);
}
.onboarding-scroll-hint svg{ animation:obBounce 1.6s ease-in-out infinite; }
@keyframes obBounce{ 0%,100%{transform:translateY(0); opacity:.4;} 50%{transform:translateY(6px); opacity:.9;} }

/* ============ SEITENÜBERGÄNGE OHNE EIGENE ANIMATION: 2s Blur-Morph ============ */
#transition-veil{
  position:fixed; inset:0; z-index:970; pointer-events:none;
  opacity:0; background:rgba(10,2,8,0);
  backdrop-filter:blur(0px) saturate(1); -webkit-backdrop-filter:blur(0px) saturate(1);
  transition:opacity .9s ease, background .9s ease, backdrop-filter .9s ease, -webkit-backdrop-filter .9s ease;
}
#transition-veil.active{
  opacity:1; background:rgba(14,3,10,.4);
  backdrop-filter:blur(24px) saturate(1.4); -webkit-backdrop-filter:blur(24px) saturate(1.4);
}

@media(min-width:680px){
  .home-title{font-size:64px;}
}
</style>
</head>
<body>
<div id="transition-veil"></div>
<div id="app">

  <!-- ===== HOME SCREEN ===== -->

  </div>

  <div class="curtain curtain-2" id="curtain-exercise">

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

  <div id="screen-muscle-world" class="screen">
    <div class="mw-header">
      <h1 class="mw-title">MUSCLES</h1>
      <div class="mw-tabs">
        <button class="mw-tab active" data-tab="today">TODAY</button>
        <button class="mw-tab" data-tab="week">WEEK</button>
        <button class="mw-tab" data-tab="all">ALL TIME</button>
      </div>
    </div>
    <div id="muscle-content"></div>
    <button class="back-arrow" id="back-muscle-world">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
  </div>

  <!-- ===== PR CELEBRATION OVERLAY ===== -->
  <div class="pr-celebration" id="pr-celebration">
    <div class="pr-glow"></div>
    <div class="pr-text">
      <div class="pr-title" id="pr-title">PR</div>

  <!-- ===== REST TIMER ===== -->

      <div class="onboarding-cta">
        <div class="ob-crystal c1">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <polygon points="10,2 18,18 2,18"/>
